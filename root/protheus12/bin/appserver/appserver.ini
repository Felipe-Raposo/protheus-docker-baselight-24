[P12]
SourcePath=/protheus12/apo
RPOCustom=/protheus12/apo/custom.rpo
RootPath=/protheus12/protheus_data
StartPath=/system/
RpoDb=top
RpoLanguage=Multi
RpoVersion=120
LocalFiles=SQLite
StartSysInDb=1
TopMemoMega=50

[Drivers]
Active=TCP
MultiProtocolPort=1
MultiProtocolPortSecure=0

[TCP]
TYPE=TCPIP
Port=1234

[LicenseClient]
Server=license-server
Port=5555

[General]
app_environment=P12
ShowFullLog=0
MaxStringSize=500
MaxQuerySize=31960
PowerSchemeShowUpgradeSuggestion=0
ConsoleLog=1
AsyncConsoleLog=1
BuildKillUsers=1

[DBAccess]
Server=dbaccess
Port=7890
ConType=TCPIP
Database={{APPSERVER_DATABASE}}
Alias=protheus

[WebApp]
Port=1234
LastMainProg=sigaadv,sigacfg,apsdu
EnvServer=P12

[WEBAGENT]
VERSION=1.0.23
Windows_x64=../webagent/web-agent-1.0.23-windows-x64-release.setup.exe
Linux_x64_deb=../webagent/web-agent-1.0.23-linux-x64-release.deb
Linux_x64_rpm=../webagent/web-agent-1.0.23-linux-x64-release.rpm
Darwin_universal=../webagent/web-agent-1.0.23-macos-universal-release.dmg

[WebMonitor]
Enable=1

[APP_MONITOR]
enable=1

[ONSTART]
JOBS=HTTPJOB
REFRESHRATE=20

[HTTPJOB]
MAIN=HTTP_START
ENVIRONMENT=P12

[HTTPV11]
Enable=1
Sockets=HTTPREST

[HTTPREST] 
Port=8080
URIs=HTTPURI
Security=1

[HTTPURI]
URL=/api
PrepareIn=All
Instances=1,1,1,1

[HTTPSERVER]
Enable=1
Servers=HTTP_REST

[HTTP_REST]
Hostname=localhost
Port=9995
Locations=HTTP_ROOT

[HTTP_ROOT]
Path=/rest
RootPath=/protheus12/protheus_data/http-root/
ThreadPool=THREAD_POOL

[THREAD_POOL]
Environment=P12
MinThreads=1

[TDS]
AllowApplyPatch=*
AllowEdit=*
EnableDisconnectUser=*
EnableSendMessage=*
EnableBlockNewConnection=*
EnableStopServer=*
